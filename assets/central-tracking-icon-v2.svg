<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="appClip">
      <rect width="1024" height="1024" rx="200"/>
    </clipPath>
  </defs>

  <!-- Background — matches app dark navy -->
  <rect width="1024" height="1024" rx="200" fill="#14192A"/>

  <!-- Lower track section -->
  <rect x="0" y="820" width="1024" height="204" fill="#0F1320" clip-path="url(#appClip)"/>

  <!-- Rail ties -->
  <rect x="72"  y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="136" y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="200" y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="264" y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="328" y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="392" y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="456" y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="520" y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="584" y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="648" y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="712" y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="776" y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="840" y="838" width="18" height="46" rx="3" fill="#1C2340"/>
  <rect x="904" y="838" width="18" height="46" rx="3" fill="#1C2340"/>

  <!-- Rails -->
  <rect x="52" y="852" width="920" height="16" rx="5" fill="#252D52"/>
  <rect x="52" y="876" width="920" height="16" rx="5" fill="#252D52"/>

  <!-- Steam puffs — ascending upper-left, navy-toned -->
  <circle cx="368" cy="244" r="62" fill="#1A2040" opacity="0.9"/>
  <circle cx="330" cy="170" r="44" fill="#1B2140" opacity="0.7"/>
  <circle cx="300" cy="110" r="30" fill="#1B2140" opacity="0.5"/>
  <circle cx="278" cy="66"  r="19" fill="#1B2140" opacity="0.32"/>

  <!-- === MAIN DRIVE WHEEL === -->

  <!-- Outer depth shadow ring -->
  <circle cx="512" cy="520" r="320" fill="none" stroke="#08090F" stroke-width="14"/>

  <!-- Wheel body (dark fill matching app sidebar tone) -->
  <circle cx="512" cy="520" r="308" fill="#181E35"/>

  <!-- Main rim — app purple/indigo -->
  <circle cx="512" cy="520" r="300" fill="none" stroke="#6B5FE4" stroke-width="32"/>

  <!-- Rim outer highlight edge -->
  <circle cx="512" cy="520" r="316" fill="none" stroke="#5248C0" stroke-width="4" opacity="0.6"/>

  <!-- Rim inner shadow line -->
  <circle cx="512" cy="520" r="282" fill="none" stroke="#4A40A8" stroke-width="3"/>

  <!-- 8 Spokes — purple tone -->
  <!-- θ=0° top -->
  <line x1="512" y1="454" x2="512" y2="254" stroke="#5C52D8" stroke-width="18" stroke-linecap="round"/>
  <!-- θ=45° top-right -->
  <line x1="559" y1="473" x2="700" y2="332" stroke="#5C52D8" stroke-width="18" stroke-linecap="round"/>
  <!-- θ=90° right -->
  <line x1="578" y1="520" x2="778" y2="520" stroke="#5C52D8" stroke-width="18" stroke-linecap="round"/>
  <!-- θ=135° bottom-right -->
  <line x1="559" y1="567" x2="700" y2="708" stroke="#5C52D8" stroke-width="18" stroke-linecap="round"/>
  <!-- θ=180° bottom -->
  <line x1="512" y1="586" x2="512" y2="786" stroke="#5C52D8" stroke-width="18" stroke-linecap="round"/>
  <!-- θ=225° bottom-left -->
  <line x1="465" y1="567" x2="324" y2="708" stroke="#5C52D8" stroke-width="18" stroke-linecap="round"/>
  <!-- θ=270° left -->
  <line x1="446" y1="520" x2="246" y2="520" stroke="#5C52D8" stroke-width="18" stroke-linecap="round"/>
  <!-- θ=315° top-left -->
  <line x1="465" y1="473" x2="324" y2="332" stroke="#5C52D8" stroke-width="18" stroke-linecap="round"/>

  <!-- Hub outer ring — purple -->
  <circle cx="512" cy="520" r="70" fill="#6B5FE4"/>
  <!-- Hub inner recess — matches app bg -->
  <circle cx="512" cy="520" r="50" fill="#14192A"/>
  <!-- Hub center boss — lighter purple -->
  <circle cx="512" cy="520" r="26" fill="#7B6FF4"/>
  <!-- Hub center hole -->
  <circle cx="512" cy="520" r="12" fill="#0F1320"/>

  <!-- Crankpin — app green accent (like the active tracking indicator) -->
  <!-- at 55° from top, radius 215: x=688, y=397 -->
  <circle cx="688" cy="397" r="30" fill="#2DCA72" stroke="#0F1320" stroke-width="5"/>
  <circle cx="688" cy="397" r="13" fill="#0F1320"/>
  <!-- Green glow ring (subtle) -->
  <circle cx="688" cy="397" r="38" fill="none" stroke="#2DCA72" stroke-width="3" opacity="0.3"/>

  <!-- Connecting rod -->
  <rect x="188" y="393" width="516" height="28" rx="14" fill="#3A3480"/>
  <rect x="188" y="397" width="516" height="20" rx="10" fill="#4C46A8"/>
  <!-- Rod end left (crosshead) -->
  <circle cx="188" cy="407" r="34" fill="#5C52D8" stroke="#0F1320" stroke-width="5"/>
  <circle cx="188" cy="407" r="16" fill="#0F1320"/>
  <circle cx="188" cy="407" r="7"  fill="#6B5FE4"/>
</svg>
