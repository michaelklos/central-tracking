name: Docs Check

# Catches drift between the committed CLI reference (.claude/cli-reference.md)
# and `ct --help` at PR time — earlier than the release-time verify-docs gate.
# Path-filtered so it only runs when something that could affect the reference
# changes. Add this as a required status check in branch protection to block
# merges on drift.

on:
  pull_request:
    paths:
      - 'src/cli/**'
      - 'scripts/generate-cli-docs.js'
      - '.claude/cli-reference.md'
      - 'package.json'
      - '.github/workflows/docs-check.yml'
  push:
    branches: [main]
    paths:
      - 'src/cli/**'
      - 'scripts/generate-cli-docs.js'
      - '.claude/cli-reference.md'
      - 'package.json'

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify committed CLI reference is up to date
        run: npm run docs:check
