name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify CLI reference is up to date
        run: npm run docs:check

  build-mac:
    needs: verify-docs
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (macOS)
        env:
          _CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          _CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          [ -n "$_CSC_LINK" ] && export CSC_LINK="$_CSC_LINK" && export CSC_KEY_PASSWORD="$_CSC_KEY_PASSWORD"
          npx electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-distributables
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  build-windows:
    needs: verify-docs
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (Windows)
        env:
          _WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          _WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if ($env:_WIN_CSC_LINK) { $env:WIN_CSC_LINK = $env:_WIN_CSC_LINK; $env:WIN_CSC_KEY_PASSWORD = $env:_WIN_CSC_KEY_PASSWORD }
          npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-distributables
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error

  release:
    needs: [build-mac, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write      # required to request the OIDC token for provenance
      attestations: write  # required to write the build-provenance attestation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate CLI reference
        run: npm run docs:cli   # writes docs/cli.md from the built ct binary

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-distributables
          path: artifacts/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-distributables
          path: artifacts/win

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          : > SHA256SUMS.txt
          for f in artifacts/mac/* artifacts/win/*; do
            [ -f "$f" ] || continue
            # Hash from inside each dir so the file records a bare filename, not a path.
            ( cd "$(dirname "$f")" && sha256sum "$(basename "$f")" )
          done | sort -k2 > SHA256SUMS.txt
          echo "Checksums:"
          cat SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/mac/*
            artifacts/win/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac/*
            artifacts/win/*
            SHA256SUMS.txt
            docs/cli.md
          generate_release_notes: true
